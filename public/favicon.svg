<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Royal Blue Gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0066ff" />
      <stop offset="100%" stop-color="#0033aa" />
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Squircle / Rounded App Icon Background -->
  <rect width="512" height="512" rx="110" fill="url(#blueGrad)" />

  <!-- Three Soccer Balls at the Top -->
  <g id="soccer-balls" transform="translate(0, 0)">
    <!-- Left Ball -->
    <g transform="translate(160, 130)">
      <circle cx="0" cy="0" r="32" fill="#ffffff" stroke="#0033aa" stroke-width="3" />
      <polygon points="0,-12 10,-4 6,8 -6,8 -10,-4" fill="#0033aa" />
      <line x1="0" y1="-12" x2="0" y2="-32" stroke="#0033aa" stroke-width="2.5" />
      <line x1="10" y1="-4" x2="26" y2="-18" stroke="#0033aa" stroke-width="2.5" />
      <line x1="6" y1="8" x2="18" y2="26" stroke="#0033aa" stroke-width="2.5" />
      <line x1="-6" y1="8" x2="-18" y2="26" stroke="#0033aa" stroke-width="2.5" />
      <line x1="-10" y1="-4" x2="-26" y2="-18" stroke="#0033aa" stroke-width="2.5" />
    </g>
    <!-- Center Ball -->
    <g transform="translate(256, 130)">
      <circle cx="0" cy="0" r="32" fill="#ffffff" stroke="#0033aa" stroke-width="3" />
      <polygon points="0,-12 10,-4 6,8 -6,8 -10,-4" fill="#0033aa" />
      <line x1="0" y1="-12" x2="0" y2="-32" stroke="#0033aa" stroke-width="2.5" />
      <line x1="10" y1="-4" x2="26" y2="-18" stroke="#0033aa" stroke-width="2.5" />
      <line x1="6" y1="8" x2="18" y2="26" stroke="#0033aa" stroke-width="2.5" />
      <line x1="-6" y1="8" x2="-18" y2="26" stroke="#0033aa" stroke-width="2.5" />
      <line x1="-10" y1="-4" x2="-26" y2="-18" stroke="#0033aa" stroke-width="2.5" />
    </g>
    <!-- Right Ball -->
    <g transform="translate(352, 130)">
      <circle cx="0" cy="0" r="32" fill="#ffffff" stroke="#0033aa" stroke-width="3" />
      <polygon points="0,-12 10,-4 6,8 -6,8 -10,-4" fill="#0033aa" />
      <line x1="0" y1="-12" x2="0" y2="-32" stroke="#0033aa" stroke-width="2.5" />
      <line x1="10" y1="-4" x2="26" y2="-18" stroke="#0033aa" stroke-width="2.5" />
      <line x1="6" y1="8" x2="18" y2="26" stroke="#0033aa" stroke-width="2.5" />
      <line x1="-6" y1="8" x2="-18" y2="26" stroke="#0033aa" stroke-width="2.5" />
      <line x1="-10" y1="-4" x2="-26" y2="-18" stroke="#0033aa" stroke-width="2.5" />
    </g>
  </g>

  <!-- Big Athletic 'ASH' Text with subtle drop shadow -->
  <g filter="url(#dropShadow)">
    <text x="256" y="305" font-family="'Impact', 'Arial Black', 'Trebuchet MS', sans-serif" font-size="140" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-3">ASH</text>
  </g>

  <!-- Star running figure cutout representation / Accent in top-right of text -->
  <g transform="translate(400, 235)">
    <!-- 4-point star -->
    <path d="M 0,-25 L 6,-6 L 25,0 L 6,6 L 0,25 L -6,6 L -25,0 L -6,-6 Z" fill="#ffffff" />
    <!-- Small runner silhouette inside star -->
    <circle cx="2" cy="-8" r="3" fill="#0033aa" />
    <path d="M 0,-4 L 3,-1 L 6,-2 M 0,-4 L -3,-6 M 1,-1 L 0,4 L 4,8 M 0,4 L -4,7" stroke="#0033aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Clean Subtext 'HOURA' below -->
  <text x="256" y="420" font-family="'Arial Black', 'Trebuchet MS', sans-serif" font-size="68" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="8">HOURA</text>
</svg>
